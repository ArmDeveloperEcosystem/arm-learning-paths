name: Generate Learning Path Summary and FAQ

on:
  workflow_dispatch:
    inputs:
      paths:
        description: "Optional comma or newline separated Learning Path directories or _index.md files. Leave blank to process all eligible paths."
        required: false
        type: string
      category:
        description: "Optional top-level Learning Path category slug. Leave blank to process all categories unless paths is set."
        required: false
        type: string
      limit:
        description: "Optional limit when paths and category are empty. Use 0 to process all eligible Learning Paths."
        required: false
        default: "0"
        type: string
      require_flag:
        description: "Only process Learning Paths where generate_summary_faq is true."
        required: true
        default: true
        type: boolean
      generation_mode:
        description: "Use ai for the Arm OpenAI proxy, or template for local deterministic fallback."
        required: true
        default: ai
        type: choice
        options:
          - ai
          - template
      openai_model:
        description: "Model or deployment name exposed by the configured OpenAI-compatible endpoint."
        required: true
        default: gpt-4.1-mini
        type: string
      dry_run:
        description: "Generate the report without changing any _index.md files."
        required: true
        default: false
        type: boolean
      commit_changes:
        description: "Commit changed _index.md files and the central report back to the selected branch."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  generate_summary_faq:
    runs-on: self-hosted-ubuntu-24.04-x64
    steps:
      - name: Check out current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install pyyaml

      - name: Generate summary and FAQ content
        env:
          INPUT_PATHS: ${{ inputs.paths }}
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_REQUIRE_FLAG: ${{ inputs.require_flag }}
          INPUT_GENERATION_MODE: ${{ inputs.generation_mode }}
          INPUT_OPENAI_MODEL: ${{ inputs.openai_model }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://openai-api-proxy.geo.arm.com/api/providers/openai/v1/responses/' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          REPORT_FILE: reports/generated-summary-faq/latest-run.yml
          LOG_FILE: reports/generated-summary-faq/latest-run.txt
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          CMD=(
            python tools/generate_summary_faq.py
            --path-filter "$INPUT_PATHS"
            --category "$INPUT_CATEGORY"
            --limit "$INPUT_LIMIT"
            --generation-mode "$INPUT_GENERATION_MODE"
            --openai-base-url "$OPENAI_BASE_URL"
            --openai-model "$INPUT_OPENAI_MODEL"
            --report-file "$REPORT_FILE"
            --log-file "$LOG_FILE"
            --run-url "$RUN_URL"
            --git-ref "$GIT_REF_NAME"
            --git-sha "$GIT_SHA"
            --actor "$GITHUB_ACTOR_NAME"
          )

          if [ "$INPUT_REQUIRE_FLAG" != "true" ]; then
            CMD+=(--allow-unflagged)
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
          else
            CMD+=(--write)
          fi

          "${CMD[@]}"

      - name: Upload latest run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-summary-faq-report
          path: |
            reports/generated-summary-faq/latest-run.yml
            reports/generated-summary-faq/latest-run.txt
          retention-days: 14

      - name: Configure git
        if: ${{ !inputs.dry_run && inputs.commit_changes }}
        run: |
          git config user.name "GitHub Actions Summary FAQ Bot"
          git config user.email "<>"

      - name: Commit generated content
        if: ${{ !inputs.dry_run && inputs.commit_changes }}
        env:
          TARGET_REF: ${{ github.ref_name }}
        run: |
          git add content/learning-paths reports/generated-summary-faq/latest-run.yml
          git commit -m "Generate Learning Path summary and FAQ content" && git push origin HEAD:$TARGET_REF || echo "No changes to commit"

      - name: Add workflow summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import pathlib
          import yaml

          report_path = pathlib.Path("reports/generated-summary-faq/latest-run.yml")
          print("# Generate summary/FAQ report")
          print("")
          print("Generated summary/FAQ report: `reports/generated-summary-faq/latest-run.yml`")
          print("")

          if not report_path.exists():
              print("Report file was not created.")
              raise SystemExit(0)

          report = yaml.safe_load(report_path.read_text(encoding="utf-8")) or {}
          latest = report.get("latest_run", {})
          totals = latest.get("totals", {})
          section_totals = latest.get("section_totals", {})
          reason_totals = latest.get("reason_totals", {})
          paths = latest.get("paths", [])

          def metric_row(label, value):
              return f"| {label} | {value} |"

          print("## Run overview")
          print("")
          print("| Metric | Count |")
          print("| --- | ---: |")
          print(metric_row("Processed", totals.get("processed", 0)))
          print(metric_row("Added", totals.get("added", 0)))
          print(metric_row("Updated", totals.get("updated", 0)))
          print(metric_row("Drift detected", totals.get("drift_detected", 0)))
          print(metric_row("Paths with drift", totals.get("paths_with_drift", 0)))
          print(metric_row("Unchanged", totals.get("unchanged", 0)))
          print(metric_row("Errors", totals.get("errors", 0)))
          print(metric_row("Summary changed", totals.get("summary_changed", 0)))
          print(metric_row("FAQs changed", totals.get("faq_changed", 0)))
          print(metric_row("Rerun flags reset", totals.get("rerun_flags_reset", 0)))
          print("")

          for section_name, title in (("summary", "Summary actions"), ("faqs", "FAQ actions")):
              actions = section_totals.get(section_name, {})
              print(f"## {title}")
              print("")
              print("| Action | Count |")
              print("| --- | ---: |")
              for action in (
                  "created",
                  "repaired_missing",
                  "rerun_requested",
                  "generator_changed",
                  "drift_detected_preserved",
                  "unchanged",
              ):
                  print(metric_row(action, actions.get(action, 0)))
              print("")

          nonzero_reasons = [(reason, count) for reason, count in reason_totals.items() if count]
          if nonzero_reasons:
              print("## Change reasons")
              print("")
              print("| Reason | Count |")
              print("| --- | ---: |")
              for reason, count in nonzero_reasons:
                  print(metric_row(reason, count))
              print("")

          interesting_paths = [
              entry for entry in paths
              if entry.get("status") != "unchanged" or entry.get("change_reasons")
          ]

          if interesting_paths:
              print("## Path details")
              print("")
              print("| Path | Status | Summary | FAQs | Reasons |")
              print("| --- | --- | --- | --- | --- |")
              for entry in interesting_paths[:50]:
                  summary_action = entry.get("summary", {}).get("action", "")
                  faq_action = entry.get("faqs", {}).get("action", "")
                  reasons = ", ".join(entry.get("change_reasons", [])) or "none"
                  print(
                      f"| `{entry.get('path', '')}` | {entry.get('status', 'unknown')} | "
                      f"{summary_action} | {faq_action} | {reasons} |"
                  )
              if len(interesting_paths) > 50:
                  print("")
                  print(f"_Showing the first 50 path rows out of {len(interesting_paths)}._")
          else:
              print("All processed Learning Paths were fully unchanged.")
          PY
